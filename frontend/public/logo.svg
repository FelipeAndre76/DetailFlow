<svg width="700" height="220" viewBox="0 0 700 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DetailFlow logo</title>
  <desc id="desc">DetailFlow wordmark with a polished monogram icon.</desc>
  <defs>
    <linearGradient id="markGradient" x1="52" y1="42" x2="176" y2="174" gradientUnits="userSpaceOnUse">
      <stop stop-color="#29E4C0"/>
      <stop offset="0.42" stop-color="#119DE0"/>
      <stop offset="1" stop-color="#244BC4"/>
    </linearGradient>
    <linearGradient id="shineGradient" x1="73" y1="51" x2="143" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.96"/>
