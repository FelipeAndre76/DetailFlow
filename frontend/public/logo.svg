    <path d="M58 151C89.5 151 111.5 136.5 126.5 110.5C134 97.5 144.5 89 160 89" stroke="url(#shineGradient)" stroke-width="12" stroke-linecap="round"/>
    <path d="M52 86C61 75 74 68 89 66" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>
    <path d="M158 136L162 145L172 149L162 153L158 162L154 153L144 149L154 145L158 136Z" fill="#FFFFFF" fill-opacity="0.76"/>
