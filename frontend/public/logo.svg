    <rect x="28" y="28" width="164" height="164" rx="44" fill="#08111F"/>
    <path d="M76 60H116C144.719 60 166 81.244 166 110C166 138.756 144.719 160 116 160H76V60Z" fill="url(#markGradient)" stroke="#FFFFFF" stroke-opacity="0.42" stroke-width="2.5"/>
